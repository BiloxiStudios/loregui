[workspace]
resolver = "2"
members = ["crates/lore-vm", "src-tauri"]

[workspace.package]
version = "0.1.0"
edition = "2021"
license = "MIT"
repository = "https://github.com/BiloxiStudios/loregui"
authors = ["Biloxi Studios Inc."]

[workspace.dependencies]
serde = { version = "1", features = ["derive"] }
serde_json = "1"
thiserror = "2"
tokio = { version = "1", features = ["process", "rt-multi-thread", "macros", "io-util", "sync"] }
tracing = "0.1"

lore = { git = "https://github.com/EpicGames/lore.git", rev = "6022734a6fa5d3f02e6f92c619624dbfbf655186" }
