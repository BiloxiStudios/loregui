name: windows-build

# PR gate: proves the Windows installer still builds. Publishing to GitHub
# Releases (rolling `nightly` on main + versioned releases on tags, across
# Windows/Linux/macOS) is handled by release.yml — kept separate so nightly is
# managed in exactly one place.
on:
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: ". -> target"

      - name: Install frontend deps
        run: npm --prefix frontend ci || npm --prefix frontend install

      - name: Build (Tauri → NSIS + MSI)
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload installer artifact
        uses: actions/upload-artifact@v4
        with:
          name: loregui-windows
          path: |
            target/release/bundle/nsis/*.exe
            target/release/bundle/msi/*.msi
          if-no-files-found: warn
