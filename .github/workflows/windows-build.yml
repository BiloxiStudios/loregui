name: windows-build

# Produces the shippable Windows installer. The release gate for community builds.
on:
  push:
    branches: [main]
    tags: ["v*"]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  build-windows:
    runs-on: windows-latest
    # tauri-action creates a GitHub Release on tag builds — needs write access.
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: ". -> target"

      - name: Install frontend deps
        run: npm --prefix frontend ci || npm --prefix frontend install

      - name: Build (Tauri → NSIS + MSI)
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          projectPath: .
          # On a tag push, tauri-action creates/uploads a GitHub Release.
          tagName: ${{ startsWith(github.ref, 'refs/tags/') && github.ref_name || '' }}
          releaseName: ${{ startsWith(github.ref, 'refs/tags/') && format('LoreGUI {0}', github.ref_name) || '' }}
          releaseDraft: true

      - name: Upload installer artifact
        if: ${{ !startsWith(github.ref, 'refs/tags/') }}
        uses: actions/upload-artifact@v4
        with:
          name: loregui-windows
          path: |
            target/release/bundle/nsis/*.exe
            target/release/bundle/msi/*.msi
          if-no-files-found: warn

      # Keep a rolling `nightly` release current with every push to main, so the
      # website's download is never stale (vs. only-on-tag releases before).
      - name: Publish rolling nightly release
        if: ${{ github.event_name == 'push' && github.ref == 'refs/heads/main' }}
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -e
          SHORT=$(echo "${GITHUB_SHA}" | cut -c1-7)
          # Re-point the rolling `nightly` tag at the current build.
          gh release delete nightly --cleanup-tag --yes 2>/dev/null || true
          sleep 3
          gh release create nightly \
            --title "LoreGUI nightly (main)" \
            --notes "Rolling build of the latest \`main\` (commit ${SHORT}). Current Windows installers (.exe NSIS + .msi). Pre-alpha." \
            --prerelease \
            --target "${GITHUB_SHA}" \
            target/release/bundle/nsis/*.exe \
            target/release/bundle/msi/*.msi
