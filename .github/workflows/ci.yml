name: ci

# Fast feedback: does lore-vm (which binds the upstream `lore` crate, requiring
# the quinn-proto [patch]) build, and is the workspace clean? The heavy Windows
# installer build lives in windows-build.yml.
on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

jobs:
  core-check:
    runs-on: ubuntu-latest
    env:
      # Drop debug info in CI so the lore-vm test-binary link stays under the
      # github-hosted runner's ~7GB ceiling. With debuginfo the linker OOM'd
      # (ld: SIGBUS / "ld terminated with signal 7") on the grown test binary.
      CARGO_PROFILE_DEV_DEBUG: "0"
      CARGO_PROFILE_TEST_DEBUG: "0"
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt
      - uses: Swatinem/rust-cache@v2
      - name: System deps for lore build
        run: sudo apt-get update && sudo apt-get install -y build-essential pkg-config
      - name: Format
        run: cargo fmt --all --check
      - name: Build lore-vm (exercises the upstream `lore` binding + quinn-proto patch)
        run: cargo check -p lore-vm
      - name: Clippy (lore-vm)
        run: cargo clippy -p lore-vm -- -D warnings
      - name: Tests (lore-vm)
        run: cargo test -p lore-vm

  palette-parity:
    # GUI parity ratchet: every registered Tauri command must be exposed in the
    # command palette (a manifest entry) or explicitly allowlisted. Fails when a
    # new lore op is wired without a GUI affordance — keeping the GUI in lock-step
    # with the API surface. See frontend/scripts/palette-parity.mjs.
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - name: Tauri command-registration guard
        run: node frontend/scripts/command-registration.mjs
      - name: Command-palette parity ratchet
        run: node frontend/scripts/palette-parity.mjs

  validate-templates:
    # Compat metadata gate (SBAI-4637 / SBAI-4649): every template asset must
    # declare compat.min_core_version so the install-time version check can
    # refuse assets that target a newer core than is running. No
    # --allow-missing-compat — all assets are migrated.
    # See scripts/validate.py.
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install PyYAML (for skill YAML validation)
        run: pip install pyyaml
      - name: Validate template compat metadata
        run: python scripts/validate.py
